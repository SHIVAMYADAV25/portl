# Assumes this file lives at the root of its own repo (portl-admin-web deployed independently,
# e.g. to Vercel/Netlify). See portl-backend/.github/workflows/backend-ci.yml for the monorepo
# alternative if all three Portl projects end up living in one repo instead.
name: Admin Web CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck + build
        run: npm run build
