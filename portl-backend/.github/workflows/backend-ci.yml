# Assumes this file lives at the root of its own repo (portl-backend deployed independently to
# Railway/Render/Fly — see README.md "Deploy"). GitHub Actions only reads workflows from a repo's
# own <root>/.github/workflows/, so if all three Portl projects end up living in one monorepo
# instead, move this file to <monorepo-root>/.github/workflows/backend-ci.yml, add
# `defaults: { run: { working-directory: portl-backend } }`, and scope the triggers with
# `on.push.paths: ["portl-backend/**"]` so this only runs when the backend actually changes.
name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
